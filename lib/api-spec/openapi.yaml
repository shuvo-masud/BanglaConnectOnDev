openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: BanglaConnect API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: profiles
    description: User profile operations
  - name: mentors
    description: Mentor discovery operations
  - name: connections
    description: Connection request operations
  - name: blogs
    description: Blog post operations
  - name: news
    description: News operations
  - name: jobs
    description: Job listing operations
  - name: events
    description: Community event operations
  - name: vault
    description: Personal vault workspace
  - name: support
    description: Support ticket operations
  - name: admin
    description: Admin operations
  - name: chat
    description: Chat and messaging

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /profiles/me:
    get:
      operationId: getMyProfile
      tags: [profiles]
      summary: Get current user's profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "404":
          description: Profile not found
    put:
      operationId: upsertMyProfile
      tags: [profiles]
      summary: Create or update current user's profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileInput"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /profiles/{id}:
    get:
      operationId: getProfile
      tags: [profiles]
      summary: Get a user profile by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "404":
          description: Profile not found

  /mentors:
    get:
      operationId: listMentors
      tags: [mentors]
      summary: List available mentors
      parameters:
        - name: specialty
          in: query
          required: false
          schema:
            type: string
        - name: country
          in: query
          required: false
          schema:
            type: string
        - name: available
          in: query
          required: false
          schema:
            type: boolean
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of mentors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Profile"

  /mentors/stats:
    get:
      operationId: getMentorStats
      tags: [mentors]
      summary: Get mentor directory stats
      responses:
        "200":
          description: Mentor stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MentorStats"

  /connections:
    get:
      operationId: listConnections
      tags: [connections]
      summary: List current user's connections
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of connections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Connection"
    post:
      operationId: requestConnection
      tags: [connections]
      summary: Send a connection request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionInput"
      responses:
        "201":
          description: Connection request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connection"

  /connections/{id}:
    patch:
      operationId: updateConnection
      tags: [connections]
      summary: Accept or decline a connection request
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionUpdate"
      responses:
        "200":
          description: Updated connection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connection"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [profiles]
      summary: Get personalized dashboard summary
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  # ── Blogs ──────────────────────────────────────────────────────────────────

  /blogs:
    get:
      operationId: listBlogs
      tags: [blogs]
      summary: List blog posts
      parameters:
        - name: tag
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of blog posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Blog"
    post:
      operationId: createBlog
      tags: [blogs]
      summary: Create a blog post
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogInput"
      responses:
        "201":
          description: Created blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"

  /blogs/{id}:
    get:
      operationId: getBlog
      tags: [blogs]
      summary: Get a blog post by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"
        "404":
          description: Not found
    put:
      operationId: updateBlog
      tags: [blogs]
      summary: Update a blog post
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogInput"
      responses:
        "200":
          description: Updated blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"
    delete:
      operationId: deleteBlog
      tags: [blogs]
      summary: Delete a blog post
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── News ───────────────────────────────────────────────────────────────────

  /news:
    get:
      operationId: listNews
      tags: [news]
      summary: List news items
      parameters:
        - name: tag
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of news items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NewsItem"
    post:
      operationId: createNews
      tags: [news]
      summary: Submit a news item
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsInput"
      responses:
        "201":
          description: Created news item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsItem"

  /news/{id}:
    get:
      operationId: getNewsItem
      tags: [news]
      summary: Get a news item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: News item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsItem"
        "404":
          description: Not found

  # ── Jobs ───────────────────────────────────────────────────────────────────

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List job postings
      parameters:
        - name: workMode
          in: query
          required: false
          schema:
            type: string
        - name: tag
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: location
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Post a job
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobInput"
      responses:
        "201":
          description: Created job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get a job posting by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job posting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Not found

  # ── Events ─────────────────────────────────────────────────────────────────

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List community events
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: upcoming
          in: query
          required: false
          schema:
            type: boolean
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create a community event
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/{id}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get an event by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          description: Not found

  /events/{id}/rsvp:
    post:
      operationId: rsvpEvent
      tags: [events]
      summary: RSVP to an event
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: RSVP created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventRsvpStatus"
    delete:
      operationId: cancelRsvp
      tags: [events]
      summary: Cancel RSVP to an event
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: RSVP cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventRsvpStatus"

  # ── Vault ──────────────────────────────────────────────────────────────────

  /vault:
    get:
      operationId: listVaultItems
      tags: [vault]
      summary: List current user's vault items
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of vault items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VaultItem"
    post:
      operationId: createVaultItem
      tags: [vault]
      summary: Create a vault item
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VaultItemInput"
      responses:
        "201":
          description: Created vault item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultItem"

  /vault/{id}:
    get:
      operationId: getVaultItem
      tags: [vault]
      summary: Get a vault item by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vault item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultItem"
        "404":
          description: Not found
    put:
      operationId: updateVaultItem
      tags: [vault]
      summary: Update a vault item
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VaultItemInput"
      responses:
        "200":
          description: Updated vault item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultItem"
    delete:
      operationId: deleteVaultItem
      tags: [vault]
      summary: Delete a vault item
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Support ────────────────────────────────────────────────────────────────

  /support/tickets:
    get:
      operationId: listSupportTickets
      tags: [support]
      summary: List current user's support tickets
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of support tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupportTicket"
    post:
      operationId: createSupportTicket
      tags: [support]
      summary: Create a support ticket
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupportTicketInput"
      responses:
        "201":
          description: Created support ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicket"

  /support/tickets/{id}:
    get:
      operationId: getSupportTicket
      tags: [support]
      summary: Get a support ticket by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Support ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicket"
        "404":
          description: Not found

  # ── Admin ──────────────────────────────────────────────────────────────────

  /admin/mentors:
    get:
      operationId: listPendingMentors
      tags: [admin]
      summary: List mentors pending approval
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of mentor profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Profile"

  /admin/mentors/{id}/status:
    patch:
      operationId: updateMentorStatus
      tags: [admin]
      summary: Approve or reject a mentor
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MentorStatusUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /admin/tickets:
    get:
      operationId: listAllSupportTickets
      tags: [admin]
      summary: List all support tickets (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of support tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupportTicket"

  /admin/tickets/{id}:
    patch:
      operationId: updateTicketStatus
      tags: [admin]
      summary: Update support ticket status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketStatusUpdate"
      responses:
        "200":
          description: Updated ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicket"

  /admin/users:
    get:
      operationId: listAllUsers
      tags: [admin]
      summary: List all users (admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of all user profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Profile"

  # ── Chat ───────────────────────────────────────────────────────────────────

  /chat/conversations:
    get:
      operationId: listConversations
      tags: [chat]
      summary: List current user's conversations
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      operationId: startConversation
      tags: [chat]
      summary: Start or retrieve a conversation with a user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartConversationInput"
      responses:
        "200":
          description: Conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /chat/conversations/{id}/messages:
    get:
      operationId: listMessages
      tags: [chat]
      summary: List messages in a conversation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
    post:
      operationId: sendMessage
      tags: [chat]
      summary: Send a message in a conversation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageInput"
      responses:
        "201":
          description: Sent message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Profile:
      type: object
      required: [id, clerkId, role, fullName, country, mentorStatus, createdAt]
      properties:
        id:
          type: integer
        clerkId:
          type: string
        fullName:
          type: string
        role:
          type: string
          enum: [student, mentor, professional, admin]
        bio:
          type: ["string", "null"]
        country:
          type: string
        city:
          type: ["string", "null"]
        skills:
          type: array
          items:
            type: string
        interests:
          type: array
          items:
            type: string
        professionalField:
          type: ["string", "null"]
        profession:
          type: ["string", "null"]
        specialties:
          type: array
          items:
            type: string
        mentorAvailable:
          type: boolean
        mentorStatus:
          type: string
          enum: [pending, approved, rejected]
        avatarUrl:
          type: ["string", "null"]
        createdAt:
          type: string

    ProfileInput:
      type: object
      required: [fullName, role, country]
      properties:
        fullName:
          type: string
        role:
          type: string
          enum: [student, mentor, professional]
        bio:
          type: string
        country:
          type: string
        city:
          type: string
        skills:
          type: array
          items:
            type: string
        interests:
          type: array
          items:
            type: string
        professionalField:
          type: string
        profession:
          type: string
        specialties:
          type: array
          items:
            type: string
        mentorAvailable:
          type: boolean
        avatarUrl:
          type: string

    Connection:
      type: object
      required: [id, fromProfileId, toProfileId, status, createdAt]
      properties:
        id:
          type: integer
        fromProfileId:
          type: integer
        toProfileId:
          type: integer
        status:
          type: string
          enum: [pending, accepted, declined]
        message:
          type: ["string", "null"]
        fromProfile:
          $ref: "#/components/schemas/Profile"
        toProfile:
          $ref: "#/components/schemas/Profile"
        createdAt:
          type: string

    ConnectionInput:
      type: object
      required: [toProfileId]
      properties:
        toProfileId:
          type: integer
        message:
          type: string

    ConnectionUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [accepted, declined]

    MentorStats:
      type: object
      required: [totalMentors, availableMentors, totalCountries, specialtyCounts]
      properties:
        totalMentors:
          type: integer
        availableMentors:
          type: integer
        totalCountries:
          type: integer
        specialtyCounts:
          type: array
          items:
            type: object
            required: [specialty, count]
            properties:
              specialty:
                type: string
              count:
                type: integer

    DashboardSummary:
      type: object
      required: [totalMentors, availableMentors, myConnectionCount, recentMembers, pendingRequests]
      properties:
        totalMentors:
          type: integer
        availableMentors:
          type: integer
        myConnectionCount:
          type: integer
        pendingRequests:
          type: integer
        recentMembers:
          type: array
          items:
            $ref: "#/components/schemas/Profile"

    # ── Blog ─────────────────────────────────────────────────────────────────

    Blog:
      type: object
      required: [id, title, content, authorId, tags, published, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        excerpt:
          type: ["string", "null"]
        coverImageUrl:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
        authorId:
          type: integer
        author:
          $ref: "#/components/schemas/Profile"
        published:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string

    BlogInput:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
        content:
          type: string
        excerpt:
          type: string
        coverImageUrl:
          type: string
        tags:
